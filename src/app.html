<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#f8f6f1" />
		<meta property="og:title" content="solarflow" />
		<meta
			property="og:description"
			content="A non-linear, adaptive clock based around sunrise and sunset — for any location, any day of the year."
		/>
		<meta property="og:image" content="%sveltekit.assets%/og-image.svg" />
		<script>
			(function () {
				try {
					var t = localStorage.getItem('solarflow.theme.v1');
					if (t === 'light' || t === 'dark') {
						document.documentElement.setAttribute('data-theme', t);
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
